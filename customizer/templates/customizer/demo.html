<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Customization Demo</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#eef2ff,#f8fafc);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.container{

    width:100%;
    max-width:900px;

    background:white;

    border-radius:20px;

    box-shadow:
    0 20px 60px rgba(0,0,0,.08);

    overflow:hidden;

}

.header{

    background:linear-gradient(135deg,#2563eb,#4f46e5);

    color:white;

    padding:35px;

}

.header h1{

    font-size:32px;
    font-weight:700;
}

.header p{

    opacity:.9;
    margin-top:8px;
}

.content{

    padding:35px;

}

.form-group{

    margin-bottom:28px;

}

label{

    display:block;

    margin-bottom:10px;

    font-weight:600;

    color:#1f2937;

}

select,
input[type=file]{

    width:100%;

    padding:14px;

    border:1px solid #d1d5db;

    border-radius:10px;

    font-size:15px;

    background:white;

    transition:.3s;

}

select:focus,
input[type=file]:focus{

    border-color:#2563eb;

    outline:none;

    box-shadow:0 0 0 4px rgba(37,99,235,.15);

}

button{

    width:100%;

    border:none;

    background:linear-gradient(135deg,#2563eb,#4f46e5);

    color:white;

    padding:15px;

    border-radius:12px;

    font-size:17px;

    font-weight:600;

    cursor:pointer;

    transition:.3s;

}

button:hover{

    transform:translateY(-2px);

    box-shadow:0 15px 30px rgba(37,99,235,.25);

}

button:active{

    transform:scale(.98);

}

#status{

    margin-top:22px;

    padding:14px;

    border-radius:10px;

    background:#eef4ff;

    color:#2563eb;

    font-weight:500;

}

#result{

    margin-top:30px;

    text-align:center;

}

#result img{

    width:100%;

    max-width:550px;

    border-radius:16px;

    border:1px solid #e5e7eb;

    box-shadow:0 10px 35px rgba(0,0,0,.12);

}

.footer{

    margin-top:25px;

    color:#6b7280;

    font-size:14px;

    text-align:center;

}

</style>

</head>

<body>

<div class="container">

    <div class="header">

        <h1>Product Customization</h1>

        <p>Upload your artwork and generate a realistic product mockup.</p>

    </div>

    <div class="content">

        <div class="form-group">

            <label>Choose Product View</label>

            <select id="productImage">

                {% for product in products %}
                    {% for img in product.images.all %}
                        <option value="{{ img.id }}">
                            {{ product.name }} - {{ img.view }}
                        </option>
                    {% endfor %}
                {% endfor %}

            </select>

        </div>

        <div class="form-group">

            <label>Upload Design</label>

            <input
                type="file"
                id="designFile"
                accept="image/*">

        </div>

        <button id="submitBtn">
            Generate Mockup
        </button>

        <p id="status"></p>

        <div id="result"></div>

        <div class="footer">
            PNG images with transparent backgrounds produce the best results.
        </div>

    </div>

</div>

<script>

const submitBtn = document.getElementById('submitBtn');
const statusEl = document.getElementById('status');
const resultEl = document.getElementById('result');

submitBtn.addEventListener('click', async () => {

  const fileInput = document.getElementById('designFile');
  const productImageId = document.getElementById('productImage').value;

  if (!fileInput.files.length) {

      alert('Choose a design file first');
      return;

  }

  statusEl.textContent = 'Uploading design...';
  resultEl.innerHTML = '';

  const form = new FormData();
  form.append('file', fileInput.files[0]);

  const uploadRes = await fetch('/api/designs/', {
      method:'POST',
      body:form
  });

  const upload = await uploadRes.json();

  statusEl.textContent = 'Queuing render job...';

  const jobRes = await fetch('/api/customize/',{

      method:'POST',

      headers:{
          'Content-Type':'application/json'
      },

      body:JSON.stringify({

          design_id:upload.id,
          product_image_id:productImageId

      })

  });

  const job = await jobRes.json();

  statusEl.textContent = 'Rendering (job '+job.id+')...';

  poll(job.id);

});

async function poll(jobId){

    const res = await fetch('/api/customize/'+jobId+'/');

    const job = await res.json();

    if(job.status==='done'){

        statusEl.textContent='Done.';

        resultEl.innerHTML='<img src="'+job.result_image+'">';

    }

    else if(job.status==='failed'){

        statusEl.textContent='Failed: '+job.error_message;

    }

    else{

        statusEl.textContent='Status: '+job.status+'...';

        setTimeout(()=>poll(jobId),700);

    }

}

</script>

</body>
</html>
